<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bookdle - Redirecting...</title>
    <script>
      // GitHub Pages / Custom Domain SPA redirect handler
      // This script handles routing for single page apps
      // Redirects 404s back to index.html and preserves the path for client-side routing

      (function() {
        var path = window.location.pathname;

        // For any 404, redirect to index and let client-side routing handle it
        // Preserve the search params and hash
        window.location.replace('/' + window.location.search + window.location.hash);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
