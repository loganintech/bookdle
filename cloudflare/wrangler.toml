name = "bookdle-proxy"
# main = "worker-proxy.js"  # JavaScript version (replaced with Rust)
compatibility_date = "2024-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

# Routes configuration
routes = [
  { pattern = "logan.game/", zone_name = "logan.game" },
  { pattern = "logan.game/bookdle", zone_name = "logan.game" },
  { pattern = "logan.game/bookdle/*", zone_name = "logan.game" }
]

# Or use this if you want to configure routes in the dashboard instead:
# workers_dev = true